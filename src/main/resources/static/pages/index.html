<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../styles/style.css" rel="stylesheet">
</head>
<body>
    <header class="app-header d-flex justify-content-between align-items-center">
        <span class="brand">LinkHub</span>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">新增</button>
    </header>

    <main class="container py-4">
        <ul id="link-list" class="list-unstyled"></ul>

        <p id="empty-state" class="text-muted text-center py-5">尚無連結記錄</p>
    </main>

    <div class="modal fade" id="addModal" tabindex="-1" aria-labelledby="addModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addModalLabel">新增連結</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="關閉"></button>
                </div>
                <form id="link-form">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="link-title" class="form-label">標題</label>
                            <input type="text" id="link-title" class="form-control" placeholder="輸入標題" required>
                        </div>
                        <div class="mb-3">
                            <label for="link-url" class="form-label">URL</label>
                            <input type="url" id="link-url" class="form-control" placeholder="https://example.com" required>
                        </div>
                        <div class="mb-1">
                            <label for="link-tags" class="form-label">標籤 (逗號分隔)</label>
                            <input type="text" id="link-tags" class="form-control" placeholder="工作, 學習">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary">新增</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalLabel">編輯連結</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="關閉"></button>
                </div>
                <form id="edit-form">
                    <input type="hidden" id="edit-id">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="edit-title" class="form-label">標題</label>
                            <input type="text" id="edit-title" class="form-control" placeholder="輸入標題" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit-url" class="form-label">URL</label>
                            <input type="url" id="edit-url" class="form-control" placeholder="https://example.com" required>
                        </div>
                        <div class="mb-1">
                            <label for="edit-tags" class="form-label">標籤 (逗號分隔)</label>
                            <input type="text" id="edit-tags" class="form-control" placeholder="工作, 學習">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary">儲存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/app.js"></script>
</body>
</html>
